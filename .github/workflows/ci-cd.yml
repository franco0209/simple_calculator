name: CI/CD Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    name: Lint y Tests (CI)
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/test.txt
          pip install flake8 pytest

      - name: Ejecutar Lint (flake8)
        run: flake8 simple_calculator --max-line-length=100

      - name: Ejecutar Tests (pytest)
        run: pytest tests/ -v

  build:
    name: Construir paquete (CD)
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar herramientas de build
        run: pip install build

      - name: Construir el paquete
        run: python -m build

      - name: Guardar artefacto
        uses: actions/upload-artifact@v4
        with:
          name: simple_calculator-package
          path: dist/*